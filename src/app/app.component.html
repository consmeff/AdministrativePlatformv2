<p-toast position="top-right" />
@if ((isLoading$ | async) === true) {
  <div class="app-loading-overlay" aria-live="polite" aria-busy="true">
    <p-progressSpinner
      styleClass="app-loading-spinner"
      strokeWidth="1"
      fill="transparent"
      animationDuration=".8s"
    />
  </div>
}
