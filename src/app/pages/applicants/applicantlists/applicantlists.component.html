<section class="applications-page">
  <header class="top-cards">
    <app-metric-card
      [active]="true"
      title="All Applicants"
      [value]="metrics.total_applicants || total_record_count"
    />
    <app-metric-card
      title="Pending Review"
      [value]="metrics.approval_status_breakdown.total_pending"
    />
    <app-metric-card
      title="Shortlisted"
      [value]="metrics.approval_status_breakdown.total_shortlisted"
    />
    <app-metric-card
      title="Directive Issued"
      [value]="metrics.approval_status_breakdown.total_compliance_required"
    />
    <app-metric-card title="Resubmitted" [value]="0" />
  </header>

  <section class="bulk-actions">
    <span class="selected-count"
      >{{ selectedApplicantIds.length }} Candidates selected</span
    >
    <app-button
      variant="outline"
      iconClass="bi bi-exclamation-triangle"
      (buttonClick)="openComplianceForSelected()"
      [disabled]="selectedApplicantIds.length === 0"
    >
      Issue Compliance Directive
    </app-button>
    <app-button
      variant="primary"
      (buttonClick)="shortlistSelected()"
      [disabled]="selectedApplicantIds.length === 0"
    >
      Shortlist
    </app-button>
  </section>

  <section class="filters-row">
    <div class="filter-main">
      <app-search-input
        [model]="searchText"
        (modelChange)="searchText = $event; onSearchTextChanged($event)"
        placeholder="Search by name or application no."
      />
    </div>
    <app-filter-select
      [options]="statusOptions"
      [model]="selectedStatus"
      optionLabel="label"
      placeholder="All Status"
      (modelChange)="onStatusChange($event)"
    />
    <app-filter-select
      [options]="programmeOptions"
      [model]="selectedProgramme"
      optionLabel="label"
      placeholder="All Programmes"
      (modelChange)="onProgrammeChange($event)"
    />
    <button type="button" class="ghost-btn">
      Export List <i class="bi bi-download"></i>
    </button>
    <button type="button" class="ghost-btn">
      Update with File <i class="bi bi-file-earmark-arrow-up"></i>
    </button>
  </section>

  <section class="table-wrap">
    <p-table [value]="filteredRows" [tableStyle]="{ 'min-width': '75rem' }">
      <ng-template pTemplate="header">
        <tr>
          <th>
            <input
              type="checkbox"
              [checked]="allRowsSelected()"
              (change)="toggleSelectAll($any($event.target).checked)"
            />
          </th>
          @for (header of tableColumns; track header) {
            <th>{{ header }}</th>
          }
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td>
            <input
              type="checkbox"
              [checked]="isSelected(row.id)"
              (change)="toggleRowSelection(row.id, $any($event.target).checked)"
            />
          </td>
          <td>
            <div class="applicant-name">{{ row.full_name }}</div>
            <div class="application-no">{{ row.application_no }}</div>
          </td>
          <td>
            <app-status-indicator
              [dot]="false"
              [pill]="true"
              tone="shortlisted"
              [text]="row.jamb_score"
            />
          </td>
          <td>{{ row.o_level }}</td>
          <td>{{ row.submission_date }}</td>
          <td>{{ row.programme }}</td>
          <td>
            <app-status-indicator
              [text]="row.status_text"
              [tone]="row.status_tone"
            />
          </td>
          <td>
            <app-table-row-actions
              (view)="viewProfile(row)"
              (shortlist)="shortlistSingle(row)"
              (compliance)="openComplianceForSingle(row)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </section>

  <app-pagination
    [first]="first"
    [rows]="rows"
    [totalRecords]="total_record_count"
    [rowsPerPageOptions]="[10, 20, 50, 100]"
    reportTemplate="Showing {first} to {last} of {totalRecords} items"
    (pageChange)="onPageChange($event)"
  />
</section>

<app-action-note-modal
  [visible]="isReasonModalVisible"
  [title]="reasonModalTitle"
  [prompt]="reasonModalPrompt"
  [subtitle]="'This will notify the applicant to correct their submission'"
  [confirmLabel]="reasonModalConfirmLabel"
  [initialNote]="reasonModalInitialNote"
  [loading]="isReasonActionLoading"
  [showReasonSelect]="true"
  [reasonOptions]="directiveReasons"
  [selectedReason]="directiveSelectedReason"
  [documentOptions]="directiveDocumentOptions"
  [selectedDocuments]="directiveSelectedDocuments"
  [notesLabel]="'Additional Notes:'"
  [notesHint]="'(optional)'"
  (closed)="closeReasonModal()"
  (submittedPayload)="submitReasonModalPayload($event)"
></app-action-note-modal>
