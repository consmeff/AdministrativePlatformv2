<section class="dashboard-page">
  <div class="row g-3 first-cards">
    <div class="col-12 col-sm-6 col-lg-3">
      <app-metric-card
        title="Total Applications"
        [value]="metrics.total_applicants"
        icon="assets/dashboard/Capa_1.png"
      />
    </div>
    <div class="col-12 col-sm-6 col-lg-3">
      <app-metric-card
        title="Shortlisted Applications"
        [value]="metrics.approval_status_breakdown.total_shortlisted"
        icon="assets/dashboard/Layer_1.png"
      />
    </div>
    <div class="col-12 col-sm-6 col-lg-3">
      <app-metric-card
        title="Pending Reviews"
        [value]="metrics.approval_status_breakdown.total_pending"
        icon="assets/dashboard/Layer_2.png"
      />
    </div>
    <div class="col-12 col-sm-6 col-lg-3">
      <app-metric-card
        title="Admitted Candidates"
        [value]="metrics.approval_status_breakdown.total_approved"
        icon="assets/dashboard/Layer_4.png"
      />
    </div>
  </div>

  <section class="status-section">
    <h3 class="section-title">Application Status</h3>
    <div class="status-body">
      <app-doughnut [chartData]="chartData"></app-doughnut>
    </div>
  </section>

  <section class="recent-section">
    <div class="recent-head">
      <h3 class="section-title">Recent Applications</h3>
      <span [routerLink]="['/pages/applicants/applicantlist']" class="viewall">
        View all <i class="bi bi-chevron-right"></i>
      </span>
    </div>
    <div class="summary-table">
      <p-table [value]="recentRows" [tableStyle]="{ 'min-width': '60rem' }">
        <ng-template pTemplate="header">
          <tr>
            <th class="checkbox-col">
              <input type="checkbox" disabled />
            </th>
            @for (header of tableColumns; track header) {
              <th>{{ header }}</th>
            }
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
          <tr>
            <td class="checkbox-col">
              <input type="checkbox" disabled />
            </td>
            <td>
              <div class="applicant-name">{{ row.applicant }}</div>
              <div class="application-no">{{ row.application_no }}</div>
            </td>
            <td>{{ row.jamb_score }}</td>
            <td>{{ row.o_level }}</td>
            <td>{{ row.submission_date }}</td>
            <td>{{ row.programme }}</td>
            <td>
              <app-status-indicator
                [text]="row.status_text"
                [tone]="row.status_tone"
              />
            </td>
            <td>
              <app-table-row-actions
                (view)="viewProfile(row)"
                (shortlist)="shortlistSingle(row)"
                (compliance)="openComplianceForSingle(row)"
              />
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </section>
</section>

<app-action-note-modal
  [visible]="isReasonModalVisible"
  [title]="reasonModalTitle"
  [prompt]="reasonModalPrompt"
  [subtitle]="'This will notify the applicant to correct their submission'"
  [confirmLabel]="reasonModalConfirmLabel"
  [initialNote]="reasonModalInitialNote"
  [loading]="isReasonActionLoading"
  [showReasonSelect]="true"
  [reasonOptions]="directiveReasons"
  [selectedReason]="directiveSelectedReason"
  [documentOptions]="directiveDocumentOptions"
  [selectedDocuments]="directiveSelectedDocuments"
  [notesLabel]="'Additional Notes:'"
  [notesHint]="'(optional)'"
  (closed)="closeReasonModal()"
  (submittedPayload)="submitReasonModalPayload($event)"
></app-action-note-modal>
