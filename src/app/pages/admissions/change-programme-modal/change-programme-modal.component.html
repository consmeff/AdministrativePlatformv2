<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  styleClass="app-modal-shell"
  (onHide)="onClose()"
>
  <ng-template pTemplate="header">
    <div>
      <h2 class="title-small app-modal-title">Change Programme on Admission</h2>
      <p class="body-small app-modal-subtitle">
        Reassign this candidate to a different programme.
      </p>
    </div>
  </ng-template>

  <div class="app-modal-content">
    <div class="app-modal-divider"></div>

    <div class="programme-from-card">
      <div class="body-small from-label">From</div>
      <div class="title-small from-value">{{ currentProgramme || "N/A" }}</div>
    </div>

    <div class="programme-arrow">
      <i class="bi bi-arrow-down"></i>
    </div>

    <div class="app-modal-field">
      <div class="label-small app-modal-label">Select New Programme</div>
      <p-select
        [options]="programmeOptions"
        [(ngModel)]="selectedProgramme"
        optionLabel="label"
        styleClass="app-modal-select"
      />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="app-modal-actions">
      <app-button
        variant="outline"
        [disabled]="loading"
        [fullWidth]="true"
        (buttonClick)="onClose()"
      >
        Cancel
      </app-button>
      <app-button
        variant="primary"
        [disabled]="loading || !selectedProgramme"
        [fullWidth]="true"
        (buttonClick)="submit()"
      >
        Admit with Change
      </app-button>
    </div>
  </ng-template>
</p-dialog>
