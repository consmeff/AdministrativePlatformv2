<section class="admissions-shell">
  <div class="cards-head">
    <button
      type="button"
      class="summary-card"
      [class.active]="isCardActive('all')"
      (click)="setCardFilter('all')"
    >
      <span class="metric">{{ getCardCount("all") }}</span>
      <span class="label">All Candidates</span>
    </button>
    <button
      type="button"
      class="summary-card"
      [class.active]="isCardActive('pending-review')"
      (click)="setCardFilter('pending-review')"
    >
      <span class="metric">{{ getCardCount("pending-review") }}</span>
      <span class="label">Pending Review</span>
    </button>
    <button
      type="button"
      class="summary-card"
      [class.active]="isCardActive('pending-publish')"
      (click)="setCardFilter('pending-publish')"
    >
      <span class="metric">{{ getCardCount("pending-publish") }}</span>
      <span class="label">Pending Publish</span>
    </button>
    <button
      type="button"
      class="summary-card"
      [class.active]="isCardActive('admitted')"
      (click)="setCardFilter('admitted')"
    >
      <span class="metric">{{ getCardCount("admitted") }}</span>
      <span class="label">Admitted Candidates</span>
    </button>
    @if (shouldShowPrimaryAction()) {
      <button
        type="button"
        class="primary-action"
        (click)="onPrimaryActionClick()"
      >
        {{ getPrimaryActionLabel() }}
      </button>
    }
  </div>

  <div class="filters-head">
    <app-search-input
      [model]="searchText"
      (modelChange)="searchText = $event; onSearchTextChanged($event)"
      placeholder="Search by name or application no."
    />
    <p-select
      [options]="approval_status"
      [(ngModel)]="selectedStatus"
      optionLabel="name"
      placeholder="All Candidates"
      (onChange)="onStatusChange($event)"
    >
    </p-select>
    <button type="button" class="outline-btn">
      Export List <i class="bi bi-download"></i>
    </button>
    <button type="button" class="outline-btn">
      Update with File <i class="bi bi-file-earmark-arrow-up"></i>
    </button>
  </div>

  <div class="summary-table">
    <p-table
      [value]="filteredRows"
      dataKey="id"
      [(selection)]="selectedRows"
      [tableStyle]="{ 'min-width': '50rem' }"
      [paginator]="true"
      [rows]="rows"
      [totalRecords]="
        activeCardFilter === 'all' ? total_record_count : filteredRows.length
      "
      [lazy]="true"
      (onLazyLoad)="onLazyLoad($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [rowsPerPageOptions]="[10, 20, 50, 100, 150, 200]"
    >
      <ng-template pTemplate="header">
        <tr>
          <th class="checkbox-col">
            <p-tableHeaderCheckbox />
          </th>
          <th>Applicant</th>
          <th>JAMB</th>
          <th>O Level</th>
          <th>CBT Score</th>
          <th>Programme</th>
          <th>Decision</th>
          <th>Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-rowData>
        <tr>
          <td class="checkbox-col">
            <p-tableCheckbox [value]="rowData" />
          </td>
          <td>
            <div class="applicant-name">{{ rowData.full_name }}</div>
            <div class="application-no">{{ rowData.application_no }}</div>
          </td>
          <td>{{ rowData.jamb_score }}</td>
          <td>{{ rowData.o_level }}</td>
          <td>{{ rowData.cbt_score }}</td>
          <td>{{ rowData.program }}</td>
          <td>
            <app-status-indicator
              [text]="rowData.status_text"
              [tone]="rowData.status_tone"
            />
          </td>
          <td>
            <app-table-row-actions
              (view)="viewProfile(rowData)"
              (shortlist)="shortlistSingle(rowData)"
              (compliance)="openComplianceForSingle(rowData)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>

<p-drawer
  [(visible)]="isApplicantDrawerVisible"
  position="right"
  [appendTo]="'body'"
  [autoZIndex]="true"
  [baseZIndex]="2000000"
  [modal]="true"
  [dismissible]="true"
  [blockScroll]="true"
  styleClass="applicant-detail-drawer"
  (onHide)="closeApplicantDrawer()"
>
  @if (selectedApplicationNo) {
    <app-applicantdetail
      [applicationNo]="selectedApplicationNo"
      [embedded]="true"
      (closed)="closeApplicantDrawer()"
    />
  }
</p-drawer>
