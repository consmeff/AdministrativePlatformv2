@if (sidebarVisible) {
  <div class="sidebar-shell">
    <button type="button" class="collapse-btn" (click)="close()">
      <i class="bi bi-chevron-left"></i>
    </button>

    <div class="brand-wrap">
      <img src="../../../assets/sblogo.png" alt="School Logo" />
    </div>

    <nav class="menu-list">
      <a
        routerLink="/pages/dashboard"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <i class="bi bi-house"></i>
        <span>Dashboard</span>
      </a>
      <a routerLink="/pages/applicants" routerLinkActive="active-link">
        <i class="bi bi-people"></i>
        <span>Applicants</span>
      </a>
      <a routerLink="/pages/payment" routerLinkActive="active-link">
        <i class="bi bi-journal-text"></i>
        <span>Exam Management</span>
      </a>
      <a routerLink="/pages/admissions" routerLinkActive="active-link">
        <i class="bi bi-mortarboard"></i>
        <span>Admissions</span>
      </a>
    </nav>

    <button type="button" class="logout-btn" (click)="logOut()">
      <i class="bi bi-box-arrow-left"></i>
      <span>LogOut</span>
    </button>
  </div>
}
