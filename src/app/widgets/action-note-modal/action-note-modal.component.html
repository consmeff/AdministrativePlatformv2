@if (visible) {
  <div class="action-modal-backdrop" (click)="close()">
    <div class="action-modal-card" (click)="$event.stopPropagation()">
      <button
        type="button"
        class="close-btn"
        [disabled]="loading"
        (click)="close()"
      >
        <i class="bi bi-x-lg"></i>
      </button>

      <h2 class="modal-title">{{ title }}</h2>
      <p class="modal-prompt">{{ prompt }}</p>
      @if (subtitle) {
        <p class="modal-subtitle">{{ subtitle }}</p>
      }

      @if (documentOptions.length > 0) {
        <div class="field-block">
          <p class="field-label" id="affected-documents-label">
            Affected Documents
          </p>
          <div
            class="checkbox-grid"
            role="group"
            aria-labelledby="affected-documents-label"
          >
            @for (doc of documentOptions; track doc) {
              <label class="check-row">
                <input
                  type="checkbox"
                  [disabled]="loading"
                  [checked]="affectedDocumentsInternal.includes(doc)"
                  (change)="onDocumentToggle(doc, $any($event.target).checked)"
                />
                <span>{{ doc }}</span>
              </label>
            }
          </div>
        </div>
      }

      @if (showReasonSelect) {
        <div class="field-block">
          <label class="field-label" for="action-note-reason-select"
            >Reason:</label
          >
          <p-select
            id="action-note-reason-select"
            [options]="reasonDropdownOptions"
            [(ngModel)]="reason"
            optionLabel="label"
            optionValue="value"
            placeholder="Select reason"
          />
        </div>
      }

      <label class="modal-label" for="action-note-reason"
        >{{ notesLabel }} <span>{{ notesHint }}</span></label
      >
      <textarea
        id="action-note-reason"
        [(ngModel)]="note"
        [placeholder]="placeholder"
        [disabled]="loading"
        rows="8"
      ></textarea>

      <div class="modal-actions">
        <app-button
          variant="muted"
          [fullWidth]="true"
          [disabled]="loading"
          (buttonClick)="close()"
        >
          {{ cancelLabel }}
        </app-button>
        <app-button
          variant="primary"
          [fullWidth]="true"
          [disabled]="loading"
          (buttonClick)="submit()"
        >
          {{ loading ? "Submitting..." : confirmLabel }}
        </app-button>
      </div>
    </div>
  </div>
}
