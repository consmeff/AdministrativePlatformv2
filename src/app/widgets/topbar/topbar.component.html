<div class="top-bar">
  <div class="d-flex align-items-center">
    <button
      type="button"
      class="sidebar-trigger"
      aria-label="Open sidebar"
      (click)="toggleSidebar()"
    >
      <i class="bi bi-list"></i>
    </button>
    <div class="top-title">{{ currentModuleName }}</div>
  </div>
  <div class="d-flex justify-content-end tb-icon">
    <i class="bi bi-bell mx-3"></i>
    <i class="bi bi-person-circle mx-3"></i>
    <div class="d-flex flex-column">
      <span>{{ dashinfo.username }}</span>
      <span>Academic Officer</span>
    </div>
  </div>
</div>
