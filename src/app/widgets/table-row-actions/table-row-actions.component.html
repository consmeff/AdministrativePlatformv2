<div class="row-actions">
  <button
    class="action-btn"
    type="button"
    aria-label="View Profile"
    data-tooltip="View Profile"
    [disabled]="disableView"
    (click)="view.emit()"
  >
    <i class="bi bi-eye"></i>
  </button>
  <button
    class="action-btn"
    type="button"
    [attr.aria-label]="shortlistTooltip"
    [attr.data-tooltip]="shortlistTooltip"
    [disabled]="disableShortlist"
    (click)="shortlist.emit()"
  >
    <i [class]="shortlistIconClass"></i>
  </button>
  <button
    class="action-btn"
    type="button"
    [attr.aria-label]="complianceTooltip"
    [attr.data-tooltip]="complianceTooltip"
    [disabled]="disableCompliance || disableShortlist"
    (click)="compliance.emit()"
  >
    <i [class]="complianceIconClass"></i>
  </button>
</div>
