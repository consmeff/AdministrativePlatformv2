<div class="row-actions">
  <button type="button" title="View profile" (click)="view.emit()">
    <i class="bi bi-eye"></i>
  </button>
  <button type="button" title="Shortlist candidate" (click)="shortlist.emit()">
    <i class="bi bi-check"></i>
  </button>
  <button
    type="button"
    title="Issue compliance directive"
    (click)="compliance.emit()"
  >
    <i class="bi bi-exclamation-triangle"></i>
  </button>
</div>
